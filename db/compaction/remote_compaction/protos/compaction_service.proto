syntax = "proto3";

import "google/protobuf/empty.proto";

package compactionservice;

message CompactionAdditionInfo {
  double score = 1;
  uint64 num_entries = 2;
  uint64 num_deletions = 3;
  uint64 compensated_file_size = 4;
  int32 output_level = 5;
  int32 start_level = 6;
}

message CompactionReply {
  int32 code = 1;
  string result = 2;
  uint64 process_latency = 3;
  uint64 open_db_latency = 4;
}

message CompactionArgs {
  string name = 1;
  string output_directory = 2;
  string input = 3;
  uint64 trigger_ms = 4;
}

message CompactionTaskArgs {
  uint64 task_id = 1;
  CompactionArgs compaction_args = 2;
}

message SubmitTaskArgs {
  uint64 task_id = 1;
  CompactionReply compaction_reply = 2;
}

message CSAStatus {
  string address = 1;
  uint64 local_task_nums = 3;
  uint64 max_task_nums = 4;
  double memory_usage = 5;
}

message AddTaskArgs {
  CompactionArgs compaction_args = 1;
  CompactionAdditionInfo compaction_addition_info = 2;
};

message TaskId {
  uint64 task_id = 1;
};

service CSAService {
  rpc ExecuteCompactionTask(CompactionTaskArgs)
      returns (google.protobuf.Empty) {}

  rpc CheckCSAStatus(google.protobuf.Empty) returns (CSAStatus) {}
}

service ProCPService {
  rpc AddTask(AddTaskArgs) returns (TaskId) {}

  rpc SubmitTask(SubmitTaskArgs) returns (google.protobuf.Empty) {}

  rpc CheckTask(TaskId) returns (CompactionReply) {}

  rpc RegisterCSA(CSAStatus) returns (google.protobuf.Empty) {}
}

// [relink/Storage-CP] Per-file refcount + GC over shared SSTs on HDFS.
// path = full HDFS URI of the .sst (e.g. hdfs://192.168.88.87:9000/kg/s0/000123.sst).
// Eager refcount: NotifyCreate(=1) -> NotifyLink(++ on relink) -> RequestDelete(--; physical
// delete only at 0). A periodic mark-sweep GC reconciles leaks against live MANIFESTs.
message FileRef {
  string path = 1;       // full HDFS URI of the .sst file
  uint32 shard_id = 2;   // owning / requesting shard index
}

message DeleteReply {
  bool deleted = 1;      // true if refcount reached 0 and the file was physically deleted
  uint32 refcount = 2;   // remaining refcount after this op (debug)
}

service StorageService {
  rpc NotifyCreate(FileRef) returns (google.protobuf.Empty) {}  // refcount[path]=1, owners={shard}
  rpc NotifyLink(FileRef) returns (google.protobuf.Empty) {}    // refcount[path]++, owners+={shard}
  rpc RequestDelete(FileRef) returns (DeleteReply) {}           // refcount--; hdfsDelete at 0
}
